server.port=${PORT:9090}
spring.application.name=cybersec-platform

# Database Configuration
# Default to H2 for local dev, but allow override via ENV for Render/Production
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/cybersecdb;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT
app.jwt.secret=b9f3c2d7a8e14f6bb3c4a9f0d2e7c1b5f8a6d3e9c4b7a1f2d8e6c3b9a0f4e7d1
app.jwt.expiration-ms=86400000

# WAF
waf.enabled=true
waf.rate-limit.requests-per-minute=100

# IDS
ids.enabled=true
ids.anomaly.threshold=0.75

# TIP — get free key at https://otx.alienvault.com
tip.feed.enabled=true
tip.otx.api-key=0164fdcd74356b28186cbe1589a2604166f86a3c2655012cf503f9bece81912f
tip.otx.base-url=https://otx.alienvault.com/api/v1
tip.cvss.auto-block-threshold=80

# ============================================================
