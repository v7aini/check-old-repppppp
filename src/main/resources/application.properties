telegram.enabled=true
telegram.bot-token=1661119083:AAG_d3GrFLD51QSWkqAN3Ue433OUvi9Wji0
telegram.chat-id=-1001208310293
telegram.alert-min-severity=HIGH

# Network Packet Capture (true = auto-captures all HTTP traffic)
network.capture.enabled=true
network.capture.interface=lo0

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.doc-expansion=none

# Thymeleaf
spring.thymeleaf.cache=false
logging.level.com.cybersec=INFO
logging.level.org.springframework.security=WARN
