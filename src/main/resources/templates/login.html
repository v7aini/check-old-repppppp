<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Login — CyberSec</title><link rel="stylesheet" th:href="@{/css/main.css}"></head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:40px;margin-bottom:8px">🛡</div>
      <h2>CyberSec Platform</h2>
      <p style="color:var(--text2);font-size:13px;margin-top:4px">IDS · WAF · Threat Intelligence</p>
    </div>
    <div th:if="${param.error}" style="background:rgba(226,75,74,.1);border:1px solid var(--danger);border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#f47676">Invalid username or password.</div>
    <div th:if="${param.logout}" style="background:rgba(29,158,117,.1);border:1px solid var(--success);border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#4ecba0">You have been signed out.</div>
    <form th:action="@{/login}" method="post">
      <div class="form-group"><label class="form-label">Username</label><input class="form-control" type="text" name="username" placeholder="admin" autofocus></div>
      <div class="form-group"><label class="form-label">Password</label><input class="form-control" type="password" name="password" placeholder="••••••••"></div>
      <button type="submit" class="btn-primary" style="width:100%;margin-top:8px">Sign in</button>
    </form>
    <p style="margin-top:20px;font-size:12px;color:var(--text2);text-align:center">Default: admin / admin123 · analyst / analyst123</p>
  </div>
</div>
</body></html>
