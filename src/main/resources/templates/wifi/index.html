<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Wi-Fi Signal Analyzer | CyberSec</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div th:replace="~{dashboard/index :: sidebar}"></div>

    <main class="main-content">
        <header class="page-header">
            <h1>Wi-Fi Spectrometer & Signal Analyzer</h1>
            <span class="badge badge-online">PROMISCUOUS MODE ACTIVE</span>
        </header>

        <div class="dashboard-container">
            <div class="grid-3">
                <div class="card" style="grid-column: span 2;">
                    <h3>Live Frequency Spectrum (2.4GHz / 5GHz)</h3>
                    <canvas id="wifiChart" height="200"></canvas>
                </div>
                <div class="card">
                    <h3>Nearby Access Points</h3>
                    <div id="apList" style="display: flex; flex-direction: column; gap: 12px;">
                        <!-- JS Loaded -->
                    </div>
                </div>
            </div>

            <div class="card" style="margin-top: 24px;">
                <h3>Connected Devices (LAN Clients)</h3>
                <div class="table-container" style="margin-top: 16px; background: rgba(0,0,0,0.2); border-radius: 12px; overflow: hidden;">
                    <table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead style="background: rgba(0,210,255,0.1); color: #00d2ff; font-size: 12px;">
                            <tr>
                                <th style="padding: 12px;">DEVICE / HOSTNAME</th>
                                <th style="padding: 12px;">IP ADDRESS</th>
                                <th style="padding: 12px;">MAC ADDRESS</th>
                                <th style="padding: 12px;">MANUFACTURER</th>
                                <th style="padding: 12px; text-align: center;">STATUS</th>
                            </tr>
                        </thead>
                        <tbody id="deviceList" style="color: #cbd5e1; font-size: 13px;">
                            <!-- JS Loaded -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const ctx = document.getElementById('wifiChart').getContext('2d');
        const wifiChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Array.from({length: 14}, (_, i) => 'CH ' + (i + 1)),
                datasets: [{
                    label: 'Signal Intensity',
                    data: Array.from({length: 14}, () => 0),
                    backgroundColor: 'rgba(0, 210, 255, 0.4)',
                    borderColor: '#00d2ff',
                    borderWidth: 1
                }]
            },
            options: {
                scales: { 
                    y: { 
                        beginAtZero: true, 
                        max: 100,
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#64748b' }
                    },
                    x: {
                        ticks: { color: '#64748b' }
                    }
                },
                plugins: { legend: { display: false } },
                animation: { duration: 500 }
            }
        });

        async function updateWifi() {
            try {
                // Fetch Spectrum Stats
                const statsRes = await fetch('/api/wifi/stats');
                const stats = await statsRes.json();
                
                wifiChart.data.datasets[0].data = stats.spectrum;
                wifiChart.update();

                // Fetch AP Scan
                const scanRes = await fetch('/api/wifi/scan');
                const aps = await scanRes.json();

                document.getElementById('apList').innerHTML = aps.map(ap => `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 8px; border-left: 3px solid ${ap.rogue ? '#ef4444' : '#00d2ff'};">
                        <div>
                            <div style="color: #fff; font-size: 13px; font-weight: 600;">${ap.ssid || '<i>Hidden SSID</i>'}</div>
                            <div style="font-size: 10px; color: #64748b;">${ap.bssid || 'N/A'} | ${ap.security} | CH ${ap.channel}</div>
                        </div>
                        <div style="text-align: right;">
                            <div style="color: ${ap.rogue ? '#ef4444' : '#10b981'}; font-weight: bold;">${ap.signal} dBm</div>
                            ${ap.rogue ? '<div style="font-size: 8px; color: #ef4444; font-weight: 800;">ROGUE DETECTED</div>' : ''}
                        </div>
                    </div>
                `).join('');

                // Update signal monitor cards (top 4)
                const monitorContainer = document.querySelector('.dashboard-container > .card:nth-child(2) > div'); // Adjust selector if needed
                // Actually the selector was a bit fragile, let's just find the monitor grid
                const monitorGrid = document.querySelector('.glass-card')?.parentElement;
                if (monitorGrid) {
                    monitorGrid.innerHTML = aps.slice(0, 4).map(ap => `
                        <div class="glass-card" style="text-align: center; ${ap.rogue ? 'border-color: #ef4444;' : ''}">
                            <i class="fas ${ap.rogue ? 'fa-skull-crossbones' : 'fa-wifi'}" style="color: ${ap.rogue ? '#ef4444' : '#10b981'};"></i>
                            <h4 style="margin: 8px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${ap.ssid || 'Hidden'}</h4>
                            <div style="font-size: 24px; font-weight: bold; color: ${ap.rogue ? '#ef4444' : '#fff'};">${ap.rogue ? 'ROGUE' : ap.signal + ' dBm'}</div>
                        </div>
                    `).join('');
                }

                // Fetch Connected Devices
                const devicesRes = await fetch('/api/wifi/devices');
                const devices = await devicesRes.json();

                document.getElementById('deviceList').innerHTML = devices.map(dev => `
                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                        <td style="padding: 12px;">
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <i class="fas ${dev.self ? 'fa-laptop-code' : 'fa-mobile-alt'}" style="color: ${dev.self ? '#00d2ff' : '#64748b'};"></i>
                                <span>${dev.hostname} ${dev.self ? '<span class="badge" style="font-size: 9px; background: #00d2ff; color: #000; padding: 2px 4px;">THIS DEVICE</span>' : ''}</span>
                            </div>
                        </td>
                        <td style="padding: 12px; font-family: monospace;">${dev.ipAddress}</td>
                        <td style="padding: 12px; font-family: monospace; color: #64748b;">${dev.macAddress}</td>
                        <td style="padding: 12px;">${dev.manufacturer}</td>
                        <td style="padding: 12px; text-align: center;">
                            <span style="height: 8px; width: 8px; background: #10b981; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px #10b981;"></span>
                            <span style="font-size: 10px; color: #10b981; margin-left: 5px;">ACTIVE</span>
                        </td>
                    </tr>
                `).join('');

            } catch (error) {
                console.error("Failed to update Wi-Fi data:", error);
            }
        }

        setInterval(updateWifi, 3000);
        updateWifi();
    </script>
</body>
</html>
